name: Build App

on:
  workflow_call:
    outputs:
      artifact-name:
        description: "The name of the uploaded artifact"
        value: ${{ jobs.build.outputs.artifact-name }}
  workflow_dispatch:

jobs:
  build:
    name: Build App
    runs-on: ubuntu-latest
    outputs:
      artifact-name: app
    permissions:
      security-events: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: '**/package-lock.json'

      - name: NPM install ./
        working-directory: ./
        run: npm ci

      - name: NPM install ./app
        working-directory: app
        run: npm ci

      - name: NPM install ./tests
        working-directory: tests
        run: npm ci

      - name: Check types
        working-directory: app
        run: npm run types:check

      - name: Knip
        working-directory: ./
        run: npm run knip

      - name: Determine fallow diff base
        id: fallow-base
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            echo "ref=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          else
            # A new branch's first push has no usable "before" commit (it's the
            # all-zero SHA), which would otherwise leave the diff base empty and
            # make fallow scan the whole repo instead of just this branch's
            # changes. Fall back to where this branch diverged from main.
            git fetch origin main
            echo "ref=$(git merge-base HEAD origin/main)" >> "$GITHUB_OUTPUT"
          fi

      - name: Fallow
        uses: fallow-rs/fallow@v3
        with:
          format: sarif
          annotations: false
          changed-since: ${{ steps.fallow-base.outputs.ref }}

      - name: Lint
        working-directory: ./
        run: npm run lint

      - name: Get current time
        id: current-time
        shell: bash
        run: echo "time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build
        working-directory: app
        env:
          VITE_COMMIT_HASH: ${{github.sha}}
          VITE_VERSION: ${{github.run_number}}
          VITE_MERGE_DATE_TIME: ${{steps.current-time.outputs.time}}
          VITE_APP_INSIGHTS_CONNECTING_STRING: ${{secrets.APP_INSIGHTS_CONNECTING_STRING}}
        run: npm run build

      - name: Run tests
        working-directory: app
        run: npm run test --if-present

      - name: Upload Fallow Results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: fallow-results.sarif

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v7
        with:
          name: app
          path: app/dist
          retention-days: 30
