name: E2E Tests
on:
  workflow_dispatch:
  workflow_call:

jobs:
  test:
    name: Run Tests (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        project: [chromium, android]

    services:
      mongo:
        image: mongo
        ports:
          - 27017:27017

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Download API artifact
        uses: actions/download-artifact@v8
        with:
          name: api
          path: ./api-artifact

      - name: Download App artifact
        uses: actions/download-artifact@v8
        with:
          name: app
          path: ./app-artifact

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.x.x"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: tests/package-lock.json

      - name: NPM install ./tests
        working-directory: tests
        run: npm ci

      - name: Check types
        working-directory: tests
        run: npm run types:check

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('tests/package-lock.json') }}

      - name: Install Playwright chromium browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: tests
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: tests
        run: npx playwright install-deps chromium

      - name: Run Playwright tests
        working-directory: tests
        run: npm run e2e:run-tests -- --project=${{ matrix.project }}

      - name: Prepare artifact name suffix
        if: failure()
        run: echo "ARTIFACT_SUFFIX=${{ matrix.project }}-${{ github.run_id }}-$(date -u +%Y-%m-%d-%H%M%S)" >> $GITHUB_ENV

      - name: Upload playwright-report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ env.ARTIFACT_SUFFIX }}
          path: tests/playwright-report/**/*
          retention-days: 5

      - name: Upload test-results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results-${{ env.ARTIFACT_SUFFIX }}
          path: tests/test-results/**/*
          retention-days: 5
